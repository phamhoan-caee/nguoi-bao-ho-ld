<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG THI TRẮC NGHIỆM NGHỀ KHOA MÁY THI CÔNG - CAEE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --caee-blue: #003399; --header-blue: #0040cc;
            --btn-orange: #ff6600; --btn-blue: #3366ff;
            --success: #28a745; --danger: #dc3545;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body { 
            background-color: #000;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Segoe UI', Arial, sans-serif; 
            overflow-x: hidden;
            transition: background-image 0.5s ease-in-out;
        }

        .bg-xe-nang { background-image: url('https://raw.githubusercontent.com/phamhoan-caee/trac-nghiem-6.5/main/bg-xe-nang.jpg'); }
        .bg-can-truc { background-image: url('https://raw.githubusercontent.com/phamhoan-caee/trac-nghiem-6.5/main/bg-can-truc.jpg'); }
        .bg-cau-truc { background-image: url('https://raw.githubusercontent.com/phamhoan-caee/trac-nghiem-6.5/main/bg-cau-truc.jpg'); }

        .welcome-container, #quiz-content, .sidebar-right > div, #ai-container {
            background: #ffffff !important; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 2px solid var(--caee-blue);
        }

        #ai-container {
            display: none; max-width: 1300px; margin: 10px auto; 
            padding: 12px 20px; align-items: center; gap: 15px; 
            border-left: 8px solid var(--btn-orange);
            flex-direction: column; /* Đổi sang column để chứa thanh tiến trình bên dưới */
        }

        /* Thanh tiến trình mới */
        .progress-wrapper { width: 100%; background: #eee; height: 12px; border-radius: 10px; margin-top: 10px; overflow: hidden; border: 1px solid #ddd; }
        #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #28a745, #85ffbd); transition: width 0.4s ease; }

        .ai-avatar {
            position: relative; width: 65px; height: 65px; 
            border-radius: 50%; border: 2px solid #ddd; overflow: hidden; flex-shrink: 0;
        }
        .ai-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .speaking-waves {
            display: none; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
            gap: 3px; align-items: flex-end; height: 15px;
        }
        .wave { width: 3px; background: var(--btn-orange); border-radius: 3px; animation: wave-anim 0.5s infinite ease-in-out; }
        @keyframes wave-anim { 0%, 100% { height: 5px; } 50% { height: 15px; } }

        .timer-floating {
            position: fixed; top: 10px; right: 10px;
            background: #ff3333; color: white; padding: 10px 20px; border-radius: 50px;
            font-weight: 900; font-size: 1.3rem; border: 2px solid white;
            z-index: 2000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #start-screen { min-height: 90vh; display: flex; justify-content: center; align-items: center; }
        .welcome-container { width: 95%; max-width: 450px; padding: 30px; }
        
        .form-control { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; font-weight: 500; }
        .btn-start { background: var(--success); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: transform 0.2s; }
        
        #quiz-screen { padding: 15px; display: none; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1300px; margin: auto; }
        #quiz-content { padding: 25px; min-height: 400px; }
        
        .option-item { border: 2px solid #eee; border-radius: 8px; padding: 18px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; font-weight: 600; color: #333; }
        .option-item.selected { border-color: var(--btn-blue); background: #eef2ff; }
        .option-item.correct { background: #d4edda !important; border-color: #28a745 !important; }
        .option-item.wrong { background: #f8d7da !important; border-color: #dc3545 !important; }

        #warning-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(220, 53, 69, 0.95); color: white; z-index: 10000; 
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        #result-screen { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .result-card { background: white; width: 100%; max-width: 450px; border-radius: 24px; padding: 30px; text-align: center; border: 4px solid var(--caee-blue); }
        .score-circle { width: 110px; height: 110px; border-radius: 50%; border: 6px solid var(--caee-blue); margin: 15px auto; display: flex; flex-direction: column; justify-content: center; font-size: 2.2rem; font-weight:bold; color: var(--caee-blue); }
        .status-badge { display: inline-block; padding: 10px 30px; border-radius: 50px; color: white; font-weight: bold; margin-bottom: 20px; font-size: 1.2rem; }

        @media (max-width: 900px) { #quiz-screen { grid-template-columns: 1fr; } }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="warning-overlay">
        <h1 style="font-size: 80px;">⚠️</h1>
        <h2>CẢNH BÁO VI PHẠM!</h2>
        <div id="cheat-count-msg" style="margin-top: 15px; font-size: 1.5rem; font-weight: 800;"></div>
    </div>

    <div id="timer" class="timer-floating">20:00</div>

    <div id="start-screen">
        <div class="welcome-container">
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-size: 16px; color: var(--caee-blue); font-weight: bold;">TRƯỜNG CĐ CƠ ĐIỆN NÔNG NGHIỆP VÀ MÔI TRƯỜNG</div>
                <div style="font-size: 18px; color: #d32f2f; font-weight: 900; margin-top: 5px; text-transform: uppercase;">KHOA MÁY THI CÔNG</div>
            </div>
            <select id="jobType" class="form-control" style="background: #fff8e1; border: 2px solid orange;" onchange="preloadQuestions()">
                <option value="1538604642">VẬN HÀNH XE NÂNG HÀNG</option>
                <option value="798209567">VẬN HÀNH CẦN TRỤC</option>
                <option value="1969781180">VẬN HÀNH CẦU TRỤC</option>
            </select>
            <input type="text" id="studentName" placeholder="HỌ VÀ TÊN HỌC VIÊN" class="form-control" style="text-transform: uppercase;">
            <input type="text" id="studentDOB" placeholder="Ngày/tháng/năm sinh" class="form-control">
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="khoaThi" value="Tháng 6/2026" class="form-control" style="flex: 1.5; background: #eee; font-weight: bold;" readonly>
                <input type="password" id="maThi" placeholder="Mã thi" class="form-control" style="flex: 1;">
            </div>
            <div style="display:flex; align-items:center; margin: 15px 0; justify-content: center; gap:10px; background: #e3f2fd; padding: 10px; border-radius: 10px;">
                <input type="checkbox" id="modeToggle" style="width:20px; height:20px; cursor: pointer;">
                <label for="modeToggle" style="cursor:pointer; font-weight: 700; color: #0d47a1;">Chế độ ÔN TẬP (Có trợ lý AI)</label>
            </div>
            <button class="btn-start" id="btnStart" onclick="validateAndStart()">VÀO THI NGAY ➔</button>
        </div>
    </div>

    <div id="ai-container">
        <div style="display: flex; align-items: center; gap: 15px; width: 100%;">
            <div class="ai-avatar">
                <img src="https://raw.githubusercontent.com/phamhoan-caee/de-thi-AI/main/%E1%BA%A3nh_nh%C3%A2n_vat_de_thi-removebg-preview.png" alt="AI">
                <div class="speaking-waves" id="ai-waves">
                    <div class="wave"></div><div class="wave"></div><div class="wave"></div>
                </div>
            </div>
            <div style="flex-grow: 1;">
                <div style="color: var(--caee-blue); font-weight: 800; font-size: 16px;">HỆ THỐNG TRỢ LÝ ẢO CAEE</div>
                <div style="color: #333; font-size: 14px; font-weight: 600;">Học viên: <span id="display-name" style="color: #d32f2f;">---</span></div>
            </div>
            <div id="progress-text" style="font-weight: 900; color: var(--success); font-size: 1.2rem;">0/30</div>
        </div>
        <div class="progress-wrapper">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div id="quiz-screen">
        <div id="quiz-content"></div>
        <div class="sidebar-right">
            <div>
                <h4 style="margin-bottom:15px; text-align:center; color: var(--caee-blue);">SƠ ĐỒ CÂU HỎI</h4>
                <div id="nav-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:8px;"></div>
                <button id="submitBtn" class="btn-start" style="margin-top:20px; background-color: var(--caee-blue);" onclick="submitQuiz()">NỘP BÀI THI</button>
            </div>
        </div>
    </div>

    <div id="result-screen">
        <div class="result-card">
            <h2 style="color: var(--caee-blue); margin-bottom: 20px;">KẾT QUẢ CỦA BẠN</h2>
            <div class="score-circle"><span id="res-score">0</span></div>
            <div id="res-badge" class="status-badge">---</div>
            <p style="margin-top: 20px; color: #666;">Hệ thống tự động làm mới sau <span id="countdown">15</span> giây...</p>
        </div>
    </div>

<script>
    const BASE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQX7gLNKe58sjBUDPDQOohDehuVD22EFgCe472mKd61a6d_FPIYFoh21DEdi9_BS7yukbuwy69Q9oZZ/pub?output=csv&gid=";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwG-oFBhn_GiGypEp6k2nzX7JMjG0t8Jil2C1cDJjTVoD_GGWVzbzFybh88WcsxlL1o/exec";
    
    let allQuestions = [], selectedQuestions = [], studentAnswers = [];
    let currentQuestionIndex = 0, timeLeft = 1200, timerInterval, isSubmitted = false, cheatCount = 0;
    const synth = window.speechSynthesis;

    function aiSpeak(text) {
        if (!text || !document.getElementById('modeToggle').checked) return;
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'vi-VN';
        utter.onstart = () => { document.getElementById('ai-waves').style.display = 'flex'; };
        utter.onend = () => { document.getElementById('ai-waves').style.display = 'none'; };
        synth.speak(utter);
    }

    window.onload = preloadQuestions;

    function preloadQuestions() {
        const jobSelect = document.getElementById('jobType');
        const gid = jobSelect.value;
        const body = document.body;
        body.className = jobSelect.options[jobSelect.selectedIndex].text.includes("XE NÂNG") ? 'bg-xe-nang' : (jobSelect.options[jobSelect.selectedIndex].text.includes("CẦN TRỤC") ? 'bg-can-truc' : 'bg-cau-truc');

        Papa.parse(BASE_CSV_URL + gid, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                allQuestions = results.data.filter(i => i.CauHoi).map(i => ({
                    question: i.CauHoi, options: [i.A, i.B, i.C, i.D].filter(o => o),
                    answer: i.DapAnDung ? i.DapAnDung.trim().toUpperCase() : "",
                    explanation: i.Giaithich || "Tuân thủ đúng quy trình kỹ thuật.",
                    image: i["HINH ANH"] || "" 
                }));
            }
        });
    }

    async function validateAndStart() {
        const maThi = document.getElementById('maThi').value.trim();
        if(!document.getElementById('studentName').value || !maThi) return alert("Nhập đủ thông tin!");
        try {
            const res = await fetch(`${WEB_APP_URL}?action=checkCode&code=${encodeURIComponent(maThi)}`);
            const result = await res.json();
            if(result.isValid) startQuiz(); else alert("Mã thi sai!");
        } catch(e) { alert("Lỗi kết nối!"); }
    }

    function startQuiz() {
        document.getElementById('display-name').innerText = document.getElementById('studentName').value.toUpperCase();
        selectedQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 30);
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('ai-container').style.display = 'flex';
        document.getElementById('timer').style.display = 'block';
        document.getElementById('quiz-screen').style.display = 'grid';
        showQuestion(0);
        startTimer();
    }

    function showQuestion(idx) {
        currentQuestionIndex = idx;
        const q = selectedQuestions[idx];
        const stored = studentAnswers.find(a => a.qIndex === idx);
        const isPractice = document.getElementById('modeToggle').checked;
        const labels = ['A', 'B', 'C', 'D'];

        let html = `<h3 style="color:var(--caee-blue); margin-bottom:15px;">Câu ${idx + 1}: ${q.question}</h3>`;
        if(q.image) html += `<center><img src="${q.image}" style="max-width:100%; border-radius:10px; margin-bottom:10px;"></center>`;

        q.options.forEach((opt, i) => {
            let cls = "";
            const isSelected = stored && opt === stored.selected;
            if(isPractice && stored) {
                if(labels[i] === q.answer) cls = "correct"; else if(isSelected) cls = "wrong";
            } else if(isSelected) cls = "selected";
            html += `<div class="option-item ${cls}" onclick="selectAns(${idx}, '${opt.replace(/'/g, "\\'")}')"><b>${labels[i]}.</b> ${opt}</div>`;
        });

        if(isPractice && stored) html += `<div style="background:#fff9c4; padding:10px; border-radius:8px; margin-top:10px;"><b>Giải thích:</b> ${q.explanation}</div>`;
        
        html += `<div style="display:flex; justify-content:space-between; margin-top:20px;">
                    <button class="btn-start" style="width:45%; background:var(--btn-blue);" onclick="showQuestion(${idx-1})" ${idx===0?'disabled':''}>Lùi lại</button>
                    <button class="btn-start" style="width:45%; background:var(--btn-blue);" onclick="showQuestion(${idx+1})" ${idx===29?'disabled':''}>Tiếp theo</button>
                 </div>`;
        document.getElementById('quiz-content').innerHTML = html;
        renderGrid();
        updateProgressBar(); // Cập nhật thanh tiến trình mỗi khi hiển thị câu hỏi
    }

    function selectAns(qIdx, ans) {
        if(isSubmitted) return;
        const findIndex = studentAnswers.findIndex(a => a.qIndex === qIdx);
        if(findIndex > -1) studentAnswers[findIndex].selected = ans;
        else studentAnswers.push({qIndex: qIdx, selected: ans});
        showQuestion(qIdx);
    }

    function updateProgressBar() {
        const completed = studentAnswers.length;
        const percent = (completed / 30) * 100;
        document.getElementById('progress-fill').style.width = percent + "%";
        document.getElementById('progress-text').innerText = `${completed}/30`;
    }

    function renderGrid() {
        const grid = document.getElementById('nav-grid');
        grid.innerHTML = "";
        selectedQuestions.forEach((_, i) => {
            const hasAns = studentAnswers.some(a => a.qIndex === i);
            const active = i === currentQuestionIndex ? 'border:3px solid var(--btn-orange);' : '';
            const bg = hasAns ? 'background:var(--caee-blue); color:white;' : 'background:#eee;';
            grid.innerHTML += `<div onclick="showQuestion(${i})" style="height:35px; display:flex; justify-content:center; align-items:center; border-radius:5px; cursor:pointer; font-weight:bold; ${bg} ${active}">${i+1}</div>`;
        });
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(timeLeft <= 0) submitQuiz(true);
        }, 1000);
    }

    async function submitQuiz(auto = false) {
        if (isSubmitted) return;
        if (!auto && !confirm("Nộp bài thi?")) return;
        isSubmitted = true; clearInterval(timerInterval);
        let score = 0;
        selectedQuestions.forEach((q, i) => {
            const ans = studentAnswers.find(a => a.qIndex === i);
            if(ans && ['A','B','C','D'][q.options.indexOf(ans.selected)] === q.answer) score++;
        });
        const status = score >= 25 ? "ĐẠT" : "KHÔNG ĐẠT";
        document.getElementById('res-score').innerText = score + "/30";
        document.getElementById('res-badge').innerText = status;
        document.getElementById('res-badge').style.backgroundColor = status === "ĐẠT" ? "#28a745" : "#dc3545";
        document.getElementById('result-screen').style.display = 'flex';
        // Gửi dữ liệu về Google Sheets...
    }

    window.onblur = () => { if(!isSubmitted && selectedQuestions.length > 0) { cheatCount++; document.getElementById('warning-overlay').style.display = 'flex'; document.getElementById('cheat-count-msg').innerText = `Vi phạm: ${cheatCount}/3`; if(cheatCount>=3) submitQuiz(true); } };
    window.onfocus = () => { document.getElementById('warning-overlay').style.display = 'none'; };
</script>
</body>
</html>
