<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG THI TRẮC NGHIỆM - CAEE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --caee-blue: #003399; --header-blue: #0040cc;
            --btn-orange: #ff6600; --btn-blue: #3366ff;
            --light-bg: #f0f2f5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background-color: var(--light-bg); font-family: 'Segoe UI', Arial, sans-serif; }

        /* --- CỤM ĐIỀU KHIỂN GÓC PHẢI (ĐỒNG HỒ & LOA) --- */
        .control-fixed-group {
            position: fixed; top: 20px; right: 20px;
            display: none; flex-direction: column; align-items: center; gap: 10px;
            z-index: 2000;
        }

        .timer-floating {
            background: rgba(255, 51, 51, 0.15); 
            backdrop-filter: blur(10px);
            color: #ff3333; padding: 10px 20px;
            border-radius: 15px;
            font-weight: 900; font-size: 1.4rem;
            border: 2px solid rgba(255, 51, 51, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 100px; text-align: center;
        }

        #mute-btn {
            cursor: pointer; font-size: 1.6rem;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            border: 2px solid #ddd;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        #mute-btn:hover { transform: scale(1.1); background: white; border-color: var(--btn-orange); }

        /* --- PHẦN CÒN LẠI CỦA GIAO DIỆN --- */
        #ai-container {
            display: none; background: white; max-width: 1200px; margin: 10px auto; 
            padding: 12px 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            align-items: center; gap: 15px; border-left: 6px solid var(--btn-orange);
        }
        .ai-avatar { position: relative; width: 60px; height: 60px; border-radius: 50%; overflow: hidden; border: 2px solid #eee; }
        .ai-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .speaking-waves { display: none; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); gap: 3px; height: 12px; }
        .wave { width: 3px; background: var(--btn-orange); border-radius: 3px; animation: wave-anim 0.5s infinite ease-in-out; }
        @keyframes wave-anim { 0%, 100% { height: 4px; } 50% { height: 12px; } }

        .caee-header {
            background: var(--header-blue); color: white; padding: 10px;
            display: none; justify-content: center; position: fixed; top: 0; width: 100%; z-index: 1000;
        }

        #start-screen { min-height: 90vh; display: flex; justify-content: center; align-items: center; }
        .welcome-container { background: white; width: 95%; max-width: 450px; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-control { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-start { background: var(--caee-blue); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        
        #quiz-screen { padding: 20px; display: none; grid-template-columns: 1fr 300px; gap: 20px; max-width: 1200px; margin: auto; padding-top: 80px; }
        #quiz-content { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .option-item { border: 2px solid #eee; border-radius: 10px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .option-item.selected { border-color: #00e5ff; background: #f0f7ff; font-weight: bold; }
        .option-item.correct { background: #d4edda !important; border-color: #28a745 !important; }
        .option-item.wrong { background: #f8d7da !important; border-color: #dc3545 !important; }

        @media (max-width: 900px) { 
            #quiz-screen { grid-template-columns: 1fr; }
            .control-fixed-group { top: 10px; right: 10px; }
            .timer-floating { font-size: 1.1rem; padding: 8px 15px; }
            #mute-btn { width: 40px; height: 40px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <!-- Cụm điều khiển Loa và Đồng hồ -->
    <div class="control-fixed-group" id="controls">
        <div id="timer" class="timer-floating">20:00</div>
        <div id="mute-btn" onclick="toggleMute()" title="Bật/Tắt âm thanh trợ lý">🔊</div>
    </div>

    <div class="caee-header" id="caee-header">
        <div style="text-align: center;">
            <div style="font-weight: 800; font-size: 14px;">TRƯỜNG CAO ĐẲNG CƠ ĐIỆN NÔNG NGHIỆP VÀ MÔI TRƯỜNG</div>
            <div id="job-display-header" style="font-weight: bold; color: #ffd700;">HỆ THỐNG SÁT HẠCH TRỰC TUYẾN</div>
        </div>
    </div>

    <div id="start-screen">
        <div class="welcome-container">
            <h2 style="text-align: center; color: var(--caee-blue); margin-bottom: 20px;">THÔNG TIN THI</h2>
            <select id="jobType" class="form-control" style="font-weight: bold;" onchange="preloadQuestions()">
                <option value="1538604642">VẬN HÀNH XE NÂNG HÀNG</option>
                <option value="798209567">VẬN HÀNH CẦN TRỤC</option>
                <option value="1969781180">VẬN HÀNH CẦU TRỤC</option>
            </select>
            <input type="text" id="studentName" placeholder="HỌ VÀ TÊN" class="form-control" style="text-transform: uppercase;">
            <input type="text" id="studentDOB" placeholder="NGÀY SINH (DD/MM/YYYY)" class="form-control">
            <input type="password" id="maThi" placeholder="MÃ PHÒNG THI" class="form-control">
            
            <div style="display:flex; align-items:center; margin: 15px 0; gap:8px;">
                <input type="checkbox" id="modeToggle" style="width:18px; height:18px;">
                <label for="modeToggle" style="cursor:pointer; font-weight: 600;">Chế độ Ôn tập (Có giải thích AI)</label>
            </div>
            
            <button class="btn-start" id="btnStart" onclick="validateAndStart()">BẮT ĐẦU BÀI THI</button>
        </div>
    </div>

    <div id="ai-container">
        <div class="ai-avatar">
            <img src="https://raw.githubusercontent.com/thayhoan/thi-xe-nang/main/images/ai-safety.png" alt="AI">
            <div class="speaking-waves" id="ai-waves">
                <div class="wave"></div><div class="wave"></div><div class="wave"></div>
            </div>
        </div>
        <div>
            <div style="font-weight: bold; color: var(--caee-blue);">Trợ lý học tập AI</div>
            <div id="ai-status" style="font-size: 13px; color: #666;">Học viên hãy tập trung làm bài...</div>
        </div>
    </div>

    <div id="quiz-screen">
        <div id="quiz-content"></div>
        <div class="sidebar">
            <div style="background:white; padding:20px; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.05);">
                <h4 style="text-align:center; margin-bottom:15px;">DANH SÁCH CÂU</h4>
                <div id="nav-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:8px;"></div>
                <button class="btn-start" style="margin-top:20px;" onclick="submitQuiz()">NỘP BÀI</button>
            </div>
        </div>
    </div>

<script>
    const BASE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR0xWc0PuitELsKkx0Lot6SMSSuJLCQRJsv7Brmz5JbypcJvisYqUlcLGjPvdjv3OgjhWJrZqqSL0VB/pub?output=csv&gid=";
    
    let allQuestions = [], selectedQuestions = [], studentAnswers = [];
    let currentQuestionIndex = 0, timeLeft = 1200, timerInterval;
    let isMuted = false;
    const synth = window.speechSynthesis;

    // --- XỬ LÝ ÂM THANH ---
    function toggleMute() {
        isMuted = !isMuted;
        const btn = document.getElementById('mute-btn');
        if (isMuted) {
            btn.innerText = "🔇";
            btn.style.color = "#ff3333";
            synth.cancel();
            document.getElementById('ai-waves').style.display = 'none';
        } else {
            btn.innerText = "🔊";
            btn.style.color = "#003399";
            speakCurrentQuestion();
        }
    }

    function aiSpeak(text) {
        if (isMuted) return;
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'vi-VN';
        utter.onstart = () => { document.getElementById('ai-waves').style.display = 'flex'; };
        utter.onend = () => { document.getElementById('ai-waves').style.display = 'none'; };
        synth.speak(utter);
    }

    function speakCurrentQuestion() {
        const q = selectedQuestions[currentQuestionIndex];
        const labels = ['A', 'B', 'C', 'D'];
        let text = `Câu ${currentQuestionIndex + 1}. ${q.question}. `;
        q.options.forEach((opt, i) => { text += `Đáp án ${labels[i]}. ${opt}. `; });
        aiSpeak(text);
    }

    // --- XỬ LÝ DỮ LIỆU ---
    function preloadQuestions() {
        const gid = document.getElementById('jobType').value;
        Papa.parse(BASE_CSV_URL + gid, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                allQuestions = results.data.map(i => ({
                    question: i.CauHoi, 
                    options: [i.A, i.B, i.C, i.D].filter(o => o),
                    answer: i.DapAnDung ? i.DapAnDung.trim().toUpperCase() : "",
                    explanation: i.Giaithich || "Hãy chú ý quy trình an toàn kỹ thuật.",
                    image: i["HINH ANH"] || "" 
                }));
            }
        });
    }

    window.onload = preloadQuestions;

    function validateAndStart() {
        if(!document.getElementById('studentName').value || !document.getElementById('maThi').value) 
            return alert("Vui lòng điền đủ thông tin!");
        
        selectedQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 30);
        
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('controls').style.display = 'flex';
        document.getElementById('ai-container').style.display = 'flex';
        document.getElementById('quiz-screen').style.display = 'grid';
        document.getElementById('caee-header').style.display = 'flex';
        
        showQuestion(0);
        startTimer();
        aiSpeak("Chào mừng bạn bắt đầu bài thi trắc nghiệm nghề.");
    }

    function showQuestion(idx) {
        currentQuestionIndex = idx;
        const q = selectedQuestions[idx];
        const stored = studentAnswers.find(a => a.qIndex === idx);
        const isPractice = document.getElementById('modeToggle').checked;
        const labels = ['A', 'B', 'C', 'D'];

        let html = `<h3>Câu ${idx + 1}: ${q.question}</h3>`;
        if(q.image) html += `<img src="${q.image}" style="max-width:100%; margin:10px 0; border-radius:10px;">`;

        q.options.forEach((opt, i) => {
            let cls = "";
            if(stored && opt === stored.selected) {
                if(isPractice) {
                    cls = (labels[i] === q.answer) ? "correct" : "wrong";
                } else {
                    cls = "selected";
                }
            }
            html += `<div class="option-item ${cls}" onclick="selectAns(${idx}, '${opt}')">${labels[i]}. ${opt}</div>`;
        });

        if(isPractice && stored) html += `<div style="padding:15px; background:#fff3cd; border-radius:10px; margin-top:10px;"><b>Giải thích:</b> ${q.explanation}</div>`;

        html += `<div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-start" onclick="showQuestion(${idx-1})" ${idx===0?'disabled':''} style="background:#666">Câu trước</button>
            <button class="btn-start" onclick="showQuestion(${idx+1})" ${idx===29?'disabled':''}>Câu tiếp theo</button>
        </div>`;

        document.getElementById('quiz-content').innerHTML = html;
        renderGrid();
        if(!stored) speakCurrentQuestion();
    }

    function selectAns(qIdx, ans) {
        const existing = studentAnswers.findIndex(a => a.qIndex === qIdx);
        if(existing > -1) studentAnswers[existing].selected = ans;
        else studentAnswers.push({qIndex: qIdx, selected: ans});
        
        if(document.getElementById('modeToggle').checked) {
            const q = selectedQuestions[qIdx];
            const labels = ['A', 'B', 'C', 'D'];
            const isRight = labels[q.options.indexOf(ans)] === q.answer;
            aiSpeak(isRight ? "Đúng rồi. " + q.explanation : "Chưa chính xác. " + q.explanation);
        }
        showQuestion(qIdx);
    }

    function renderGrid() {
        const grid = document.getElementById('nav-grid');
        grid.innerHTML = "";
        selectedQuestions.forEach((_, i) => {
            const hasAns = studentAnswers.some(a => a.qIndex === i);
            const active = i === currentQuestionIndex ? 'border:2px solid black;' : '';
            const bg = hasAns ? 'background:var(--caee-blue); color:white;' : 'background:white;';
            grid.innerHTML += `<div onclick="showQuestion(${i})" style="height:35px; display:flex; justify-content:center; align-items:center; border-radius:5px; cursor:pointer; ${bg} ${active}">${i+1}</div>`;
        });
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(timeLeft <= 0) submitQuiz();
        }, 1000);
    }

    function submitQuiz() {
        clearInterval(timerInterval);
        alert("BÀI THI ĐÃ ĐƯỢC GỬI THÀNH CÔNG!");
        location.reload();
    }
</script>
</body>
</html>
